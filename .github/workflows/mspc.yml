name: Run mspc.js

on:
  workflow_dispatch:
    inputs:
      RUN_NUMBER:
        description: 'Run number provided by Google Apps Script'
        required: true
        type: string

jobs:
  run-mspc:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 🟢 Cache node_modules
      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 Install dependencies
        run: npm install

      # 🟢 Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run mspc.js script
        run: node mspc.js
        env:
          RUN_NUMBER: ${{ github.event.inputs.RUN_NUMBER }}

          LP_EMAIL: ${{ secrets.LP_EMAIL }}
          LP_PASSWORD: ${{ secrets.LP_PASSWORD }}
          LP_TELEPORT_URL: ${{ secrets.LP_TELEPORT_URL }}
          LP_MAPS_URL: ${{ secrets.LP_MAPS_URL }}
          LP_SLOTS_URL: ${{ secrets.LP_SLOTS_URL }}
          LP_MEMORY_URL: ${{ secrets.LP_MEMORY_URL }}

      - name: 🖼️ Upload error screenshots if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: |
            login-error-*.png
            cookie-error.png
            maps-error.png
            slots-error.png
            burn-error.png
            bp-fallback-error.png
            bp-error-*.png
